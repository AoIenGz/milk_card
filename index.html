<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Milk Card - 每日待办</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/carousel.css">
  <link rel="stylesheet" href="css/page.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <!-- VANTA.NET 动态背景 -->
  <div id="vanta-bg"></div>

  <!-- 登录页面 -->
  <div id="login-scene">
    <div class="login-card">
      <h1 class="login-title">Milk Card</h1>
      <p class="login-subtitle">每日待办</p>

      <form id="login-form" class="login-form">
        <input type="text" id="login-user" class="login-stagger" placeholder="用户名" autocomplete="username" required>
        <input type="password" id="login-pass" class="login-stagger" placeholder="密码" autocomplete="current-password" required>
        <button type="submit" class="login-btn login-stagger">登 录</button>
        <button type="button" id="show-register" class="login-link login-stagger">没有账号？注册</button>
      </form>

      <form id="register-form" class="login-form" style="display:none">
        <input type="text" id="reg-user" class="login-stagger" placeholder="用户名" autocomplete="username" required>
        <input type="password" id="reg-pass" class="login-stagger" placeholder="密码（至少6位）" autocomplete="new-password" required minlength="6">
        <button type="submit" class="login-btn login-stagger">注 册</button>
        <button type="button" id="show-login" class="login-link login-stagger">已有账号？登录</button>
      </form>
    </div>
  </div>

  <!-- 主应用 -->
  <div id="app" style="display:none">

    <!-- 统计面板 -->
    <div id="stats-panel">
      <div class="stat-ring" id="stat-today">
        <svg viewBox="0 0 48 48">
          <circle class="stat-ring-bg" cx="24" cy="24" r="20"/>
          <circle class="stat-ring-fill today" cx="24" cy="24" r="20"
            stroke-dasharray="125.66" stroke-dashoffset="125.66"/>
        </svg>
        <div class="stat-ring-text">
          <span class="stat-ring-number">0/0</span>
          <span class="stat-ring-label">今日</span>
        </div>
      </div>

      <div class="stat-divider"></div>

      <div class="stat-ring" id="stat-week">
        <svg viewBox="0 0 48 48">
          <circle class="stat-ring-bg" cx="24" cy="24" r="20"/>
          <circle class="stat-ring-fill week" cx="24" cy="24" r="20"
            stroke-dasharray="125.66" stroke-dashoffset="125.66"/>
        </svg>
        <div class="stat-ring-text">
          <span class="stat-ring-number">0</span>
          <span class="stat-ring-label">本周</span>
        </div>
      </div>

      <div class="stat-divider"></div>

      <div class="stat-ring" id="stat-last-week">
        <svg viewBox="0 0 48 48">
          <circle class="stat-ring-bg" cx="24" cy="24" r="20"/>
          <circle class="stat-ring-fill last-week" cx="24" cy="24" r="20"
            stroke-dasharray="125.66" stroke-dashoffset="125.66"/>
        </svg>
        <div class="stat-ring-text">
          <span class="stat-ring-number">0</span>
          <span class="stat-ring-label">上周</span>
        </div>
      </div>
    </div>

    <!-- 右上角用户面板 -->
    <div id="user-panel">
      <span id="username-display"></span>
      <button id="logout-btn" class="logout-btn" aria-label="退出登录">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>

    <!-- 轮播场景 -->
    <div id="carousel-scene">
      <div id="carousel-wrapper">
        <div id="carousel"></div>
      </div>

      <button id="btn-prev" aria-label="前一天">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <button id="btn-next" aria-label="后一天">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 6 15 12 9 18"></polyline>
        </svg>
      </button>

      <div id="carousel-indicator"></div>
    </div>

    <!-- 全屏页面场景 -->
    <div id="page-scene" class="hidden">
      <header id="page-header">
        <button id="btn-close" aria-label="返回轮播">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <h1 id="page-title"></h1>
        <span id="page-progress"></span>
      </header>
      <div id="page-body">
        <ul id="todo-list"></ul>
        <button id="btn-add-todo">+ 添加任务</button>
      </div>
    </div>

  </div>

  <script src="lib/gsap.min.js"></script>
  <script src="js/three.r134.min.js"></script>
  <script src="js/vanta.net.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
